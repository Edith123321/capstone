<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🫀 Heart Sound Classifier</title>
    <style>
        /* ... (all the styles remain the same) ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }
        .header {
            text-align: center;
            padding: 20px;
        }
        .header h1 {
            font-size: 24px;
            color: #2d3748;
        }
        .header p {
            color: #718096;
            font-size: 14px;
            margin-top: 4px;
        }
        .upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: #f7fafc;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .upload-area:active {
            transform: scale(0.98);
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #edf2f7;
        }
        .upload-area .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .upload-area p {
            color: #4a5568;
        }
        .upload-area .small {
            font-size: 12px;
            color: #a0aec0;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .file-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f7fafc;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
        }
        .file-name {
            flex: 1;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-size {
            color: #718096;
            font-size: 14px;
            margin: 0 12px;
        }
        .btn-remove {
            background: #fc8181;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-remove:active {
            transform: scale(0.9);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #edf2f7;
            color: #2d3748;
        }
        .btn-secondary:active {
            background: #e2e8f0;
        }
        .result-card {
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 0;
        }
        .result-card.normal {
            background: #c6f6d5;
            border: 2px solid #48bb78;
        }
        .result-card.rhd {
            background: #fed7d7;
            border: 2px solid #fc8181;
        }
        .prediction {
            font-size: 32px;
            font-weight: bold;
            margin: 8px 0;
        }
        .result-card.normal .prediction {
            color: #276749;
        }
        .result-card.rhd .prediction {
            color: #9b2c2c;
        }
        .confidence {
            font-size: 16px;
            color: #4a5568;
        }
        .badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            margin-top: 8px;
        }
        .badge.normal {
            background: #48bb78;
        }
        .badge.rhd {
            background: #fc8181;
        }
        .prob-section {
            margin-top: 20px;
        }
        .prob-section h4 {
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 12px;
        }
        .prob-bar {
            margin-bottom: 8px;
        }
        .prob-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .prob-label .label {
            color: #4a5568;
        }
        .prob-label .value {
            font-weight: 600;
            color: #2d3748;
        }
        .prob-track {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .prob-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }
        .prob-fill.normal {
            background: linear-gradient(90deg, #48bb78, #38a169);
        }
        .prob-fill.rhd {
            background: linear-gradient(90deg, #fc8181, #e53e3e);
        }
        .visualization-container {
            margin-top: 16px;
        }
        .visualization-container h4 {
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 8px;
        }
        .visualization {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 8px;
            background: white;
        }
        .features-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
        .features-section h4 {
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 8px;
        }
        .feature-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
            border-bottom: 1px solid #f7fafc;
        }
        .feature-item .name {
            color: #4a5568;
        }
        .feature-item .value {
            font-weight: 600;
            color: #2d3748;
        }
        .loading {
            text-align: center;
            padding: 30px;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading p {
            margin-top: 12px;
            color: #4a5568;
            font-weight: 500;
        }
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            padding: 16px 0;
        }
        .server-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #718096;
            padding: 8px 12px;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.online {
            background: #48bb78;
        }
        .status-dot.offline {
            background: #fc8181;
        }
        .record-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: #f7fafc;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #4a5568;
            -webkit-tap-highlight-color: transparent;
        }
        .record-btn:active {
            transform: scale(0.98);
        }
        .record-btn.recording {
            border-color: #fc8181;
            background: #fff5f5;
        }
        .record-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e53e3e;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .recording-time {
            font-size: 14px;
            color: #718096;
            text-align: center;
            margin-top: 4px;
        }
        @media (max-width: 480px) {
            body { padding: 10px; }
            .card { padding: 16px; }
            .header h1 { font-size: 20px; }
            .upload-area { padding: 30px 16px; }
            .prediction { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="card header">
            <h1>🫀 Heart Sound Classifier</h1>
            <p>Upload or record a heart sound for RHD detection</p>
        </div>

        <!-- Server Status -->
        <div class="card" style="padding:12px 16px;">
            <div class="server-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Checking server...</span>
            </div>
        </div>

        <!-- Upload Section -->
        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="icon">📁</div>
                <p><strong>Tap to select</strong> an audio file</p>
                <p class="small">WAV, MP3, FLAC, M4A</p>
                <input type="file" id="fileInput" accept=".wav,.mp3,.flac,.m4a">
            </div>
            
            <div id="fileInfo" style="display:none;" class="file-info">
                <span class="file-name" id="fileName">file.wav</span>
                <span class="file-size" id="fileSize">0 MB</span>
                <button class="btn-remove" onclick="removeFile()">✕</button>
            </div>

            <!-- Record Button -->
            <div style="margin-top:12px;">
                <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
                    <span id="recordIcon">🎙️</span>
                    <span id="recordText">Record Heart Sound</span>
                </button>
                <div class="recording-time" id="recordingTime"></div>
            </div>

            <button class="btn" id="predictBtn" disabled onclick="predict()">🔬 Analyze Heart Sound</button>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" style="display:none;"></div>

        <!-- Loading -->
        <div id="loadingSection" style="display:none;">
            <div class="card loading">
                <div class="spinner"></div>
                <p>Analyzing heart sound...</p>
            </div>
        </div>

        <div class="footer">
            <p>RHD Detection | Random Forest Model • 98.4% Accuracy</p>
            <p style="margin-top:4px;font-size:11px;opacity:0.7;">Mitral Valve Heart Sound Classification</p>
        </div>
    </div>

    <script>
        // FIX: Use the correct API URL - this is the key change!
        // Use relative path since the page is served from the same server
        const API_BASE_URL = '/api/v1/screening';
        
        let selectedFile = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingTimer = null;
        let recordingSeconds = 0;

        // DOM elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const predictBtn = document.getElementById('predictBtn');
        const resultsSection = document.getElementById('resultsSection');
        const loadingSection = document.getElementById('loadingSection');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // Upload handlers
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const validTypes = ['audio/wav', 'audio/mpeg', 'audio/flac', 'audio/m4a', 'audio/x-wav'];
            if (!validTypes.includes(file.type) && !file.name.match(/\.(wav|mp3|flac|m4a)$/i)) {
                alert('Please upload a valid audio file (WAV, MP3, FLAC, M4A)');
                return;
            }
            
            if (file.size > 50 * 1024 * 1024) {
                alert('File is too large. Maximum size is 50MB.');
                return;
            }
            
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            fileInfo.style.display = 'flex';
            predictBtn.disabled = false;
            resultsSection.style.display = 'none';
            
            document.getElementById('recordText').textContent = 'Record Heart Sound';
            document.getElementById('recordIcon').textContent = '🎙️';
        }

        function removeFile() {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.style.display = 'none';
            predictBtn.disabled = true;
            resultsSection.style.display = 'none';
        }

        // Recording functionality
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioFile = new File([audioBlob], 'recording.wav', { type: 'audio/wav' });
                    handleFile(audioFile);
                    
                    document.getElementById('recordText').textContent = 'Record Heart Sound';
                    document.getElementById('recordIcon').textContent = '🎙️';
                    document.getElementById('recordBtn').classList.remove('recording');
                    document.getElementById('recordingTime').textContent = '';
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                recordingSeconds = 0;
                
                document.getElementById('recordText').textContent = 'Stop Recording';
                document.getElementById('recordIcon').textContent = '⏹️';
                document.getElementById('recordBtn').classList.add('recording');
                
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds / 60);
                    const secs = recordingSeconds % 60;
                    document.getElementById('recordingTime').textContent = 
                        `⏱️ ${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                }, 1000);

            } catch (error) {
                console.error('Error starting recording:', error);
                if (error.name === 'NotAllowedError') {
                    alert('Please grant microphone permission to record.');
                } else {
                    alert('Failed to start recording. Please check your microphone.');
                }
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingTimer);
            }
        }

        // Prediction
        async function predict() {
            if (!selectedFile) return;

            loadingSection.style.display = 'block';
            resultsSection.style.display = 'none';
            predictBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                // FIX: Use the correct API URL
                const response = await fetch(`${API_BASE_URL}/predict`, {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();

                if (data.success) {
                    displayResults(data);
                } else {
                    alert('Error: ' + (data.error || 'Failed to analyze heart sound'));
                }
            } catch (error) {
                console.error('Error:', error);
                if (error.message.includes('Failed to fetch')) {
                    alert('Cannot connect to server. Please ensure the backend is running.');
                } else {
                    alert('Error: ' + error.message);
                }
            } finally {
                loadingSection.style.display = 'none';
                predictBtn.disabled = false;
            }
        }

        function displayResults(data) {
            const isNormal = data.prediction === 'Normal';
            
            let html = `
                <div class="card result-card ${isNormal ? 'normal' : 'rhd'}">
                    <div>
                        <div style="font-size:14px;color:#4a5568;">Prediction</div>
                        <div class="prediction">${data.prediction}</div>
                        <div class="confidence">${data.confidence.toFixed(1)}% Confidence</div>
                        <div>
                            <span class="badge ${isNormal ? 'normal' : 'rhd'}">
                                ${isNormal ? '✅ Healthy' : '⚠️ RHD Detected'}
                            </span>
                        </div>
                    </div>
                    
                    <div class="prob-section">
                        <h4>Confidence Scores</h4>
                        <div class="prob-bar">
                            <div class="prob-label">
                                <span class="label">Normal</span>
                                <span class="value">${(data.probabilities.Normal * 100).toFixed(1)}%</span>
                            </div>
                            <div class="prob-track">
                                <div class="prob-fill normal" style="width:${data.probabilities.Normal * 100}%;"></div>
                            </div>
                        </div>
                        <div class="prob-bar">
                            <div class="prob-label">
                                <span class="label">RHD</span>
                                <span class="value">${(data.probabilities.RHD * 100).toFixed(1)}%</span>
                            </div>
                            <div class="prob-track">
                                <div class="prob-fill rhd" style="width:${data.probabilities.RHD * 100}%;"></div>
                            </div>
                        </div>
                    </div>

                    ${data.visualization ? `
                        <div class="visualization-container">
                            <h4>📊 Visualization</h4>
                            <img src="data:image/png;base64,${data.visualization}" class="visualization" alt="Heart sound analysis">
                        </div>
                    ` : ''}

                    ${data.top_features && data.top_features.length > 0 ? `
                        <div class="features-section">
                            <h4>🔍 Key Acoustic Features</h4>
                            ${data.top_features.slice(0, 5).map(f => `
                                <div class="feature-item">
                                    <span class="name">${f.Feature}</span>
                                    <span class="value">${(f.Importance * 100).toFixed(2)}%</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    <button class="btn btn-secondary" onclick="removeFile();resultsSection.style.display='none';" style="margin-top:16px;">
                        🔄 New Analysis
                    </button>
                </div>
            `;

            resultsSection.innerHTML = html;
            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Health check - FIX: Use relative path
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                
                statusDot.className = 'status-dot online';
                statusText.textContent = data.model_loaded ? 
                    '✅ Server ready • Model loaded' : 
                    '⚠️ Server running • Model not loaded';
                
                if (!data.model_loaded) {
                    console.warn('Model not loaded!');
                }
            } catch (error) {
                console.error('Health check failed:', error);
                statusDot.className = 'status-dot offline';
                statusText.textContent = '❌ Server offline • Please start backend';
            }
        }

        // Check health on load and every 30 seconds
        checkHealth();
        setInterval(checkHealth, 30000);

        // Prevent closing when recording
        window.addEventListener('beforeunload', (e) => {
            if (isRecording) {
                e.preventDefault();
                e.returnValue = 'Recording in progress. Are you sure you want to leave?';
            }
        });

        // Handle visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isRecording) {
                stopRecording();
            }
        });
    </script>
</body>
</html>
