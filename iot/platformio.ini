; platformio.ini
; PlatformIO Project Configuration File for ESP32 Stethoscope

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Libraries - Only confirmed working libraries
lib_deps =
    ; WebSocket for real-time audio streaming
    links2004/WebSockets@^2.4.1
    
    ; JSON for data serialization
    bblanchon/ArduinoJson@^6.19.4
    
    ; WiFi Manager for easy WiFi setup
    tzapu/WiFiManager@^2.0.9
    
    ; Audio Processing (FFT)
    hideakitai/ArduinoFFT@^1.0.0
    
    ; Simple audio library
    earlephilhower/ESP8266Audio@^1.9.7

; Build flags
build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D USE_WEBSOCKET
    -D USE_BLE
    -D ESP32

; Upload options
upload_port = /dev/cu.usbserial-*